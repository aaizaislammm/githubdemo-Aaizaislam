name: CI/CD Pipeline        # Workflow name

on:                          # Event - triggers the workflow
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:                        # Jobs section
  build:                     # Job name
    runs-on: ubuntu-latest   # Runner environment

    steps:                   # Steps inside the job

      - name: Checkout Code  # Step 0 - get the repo code
        uses: actions/checkout@v3

      - name: Show Current Directory   # Step 1
        run: pwd

      - name: List Files               # Step 2
        run: ls -la

      - name: Make Directory           # Step 3
        run: mkdir my_new_folder

      - name: Echo Message             # Step 4
        run: echo "I am learning Github Actions"
